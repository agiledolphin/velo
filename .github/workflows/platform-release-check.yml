name: Platform release check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
            artifactName: velo-windows-x64
            artifactPath: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - name: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb
            artifactName: velo-linux-x64
            artifactPath: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend and configuration tests
        run: bun run test

      - name: Prepare verified yt-dlp sidecar
        env:
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
        run: bun run engine:prepare-sidecar

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: Run Rust lints
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Build native application package
        run: bun run tauri build --ci --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Verify Linux package contains yt-dlp
        if: runner.os == 'Linux'
        shell: bash
        run: |
          package=$(find src-tauri/target/${{ matrix.target }}/release/bundle/deb -name '*.deb' -print -quit)
          test -n "$package"
          dpkg-deb --contents "$package" > package-contents.txt
          grep -q '/yt-dlp$' package-contents.txt

      - name: Verify Windows installer contains yt-dlp
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $package = Get-ChildItem "src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $package) { throw "NSIS installer was not created" }
          $listing = & 7z l $package.FullName
          if ($LASTEXITCODE -ne 0) { throw "Unable to inspect NSIS installer" }
          if (-not ($listing | Select-String -SimpleMatch "yt-dlp.exe")) { throw "yt-dlp.exe is missing from NSIS installer" }

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactPath }}
          if-no-files-found: error
          retention-days: 7
